name: Update A-share cache

on:
  workflow_dispatch:
  schedule:
    # 23:30 Beijing time = 15:30 UTC
    - cron: "30 15 * * *"

permissions:
  contents: write

concurrency:
  group: update-a-share-cache
  cancel-in-progress: false

jobs:
  update-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Save cache timestamp before update
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("stock_metrics.csv")
          Path(".stock_metrics_mtime_before").write_text(
              str(path.stat().st_mtime if path.exists() else 0),
              encoding="utf-8",
          )
          PY

      - name: Update market cache
        run: |
          python -u update_cache.py --skip-finance | tee update_cache.log

      - name: Validate cache file
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          path = Path("stock_metrics.csv")
          if not path.exists():
              raise SystemExit("stock_metrics.csv does not exist")

          before = float(Path(".stock_metrics_mtime_before").read_text(encoding="utf-8"))
          after = path.stat().st_mtime
          if after <= before:
              raise SystemExit("stock_metrics.csv was not rewritten; update likely failed")

          df = pd.read_csv(path, dtype={"代码": str})
          print("stock_metrics.csv rows:", len(df))
          print("columns:", list(df.columns))
          print(df.head())

          if len(df) < 1000:
              raise SystemExit("stock_metrics.csv has too few rows")

          required = ["代码", "名称", "最新价", "涨跌幅", "成交额"]
          missing = [col for col in required if col not in df.columns]
          if missing:
              raise SystemExit(f"stock_metrics.csv missing required columns: {missing}")
          PY

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stock_metrics.csv
          git diff --cached --quiet || git commit -m "Update stock metrics cache"
          git push
