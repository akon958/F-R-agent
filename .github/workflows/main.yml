name: Update industry map

on:
  schedule:
    - cron: '0 2 1 1,4,7,10 *'   # 每季度第一天凌晨 2 点（1月/4月/7月/10月）
  workflow_dispatch:               # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install akshare pandas requests urllib3

      - name: Build industry map
        
        run: python build_industry_map.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add industry_map.csv
          git diff --cached --quiet || git commit -m "chore: update industry_map.csv"
          git push
